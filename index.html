<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erapor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 25px;
    }
    .btn {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      transition: 0.2s;
    }
    .btn-local {
      background: #2ecc71;
    }
    .btn-public {
      background: #3498db;
    }
    .btn:hover {
      opacity: 0.85;
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Akses Erapor</h1>
    <p>Pilih akses sesuai lokasi Anda</p>

    <a class="btn btn-local" href="http://192.168.0.15:8239">
      Akses dari Sekolah (Jaringan Lokal)
    </a>

    <a class="btn btn-public" href="http://103.210.35.86:8239">
      Akses dari Rumah (Internet)
    </a>

    <div class="note">
      Jika berada di lingkungan sekolah, gunakan akses lokal untuk kecepatan lebih baik.
    </div>
  </div>
</body>
</html>
